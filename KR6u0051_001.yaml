body:
  text: 天台山中有一老師年可九神悲哭眼中泣血唱言苦弟子惠通合掌頂禮眼中泣淚災難如何得免師報言惠通眾生亡沒普念彌勒已比相相魏之地正在其中愚三月四月鬼兵亂起無邊無際八月九月末劫眾生行善鬼兵自滅天地黑闇得免寫一本免一門寫兩本免六親寫三本免一村流傳者是弟子謗此經者入阿鼻地獄無有出期見此經不寫者滅門至心讀誦者得成佛道黑風西北起東南興鬼兵永常天地闇何得心先須斷酒肉貪嗔更莫生人能慎此事佛道一時
